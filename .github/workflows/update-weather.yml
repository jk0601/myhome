name: Update Weather and Outfit

on:
  schedule:
    # 매일 아침 6시 (한국 시간) = UTC 21시 (전날)
    - cron: '0 21 * * *'
  workflow_dispatch:  # 수동 실행 가능
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run weather outfit script
      env:
        OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      run: |
        python weather_outfit.py

    - name: Commit and push if changed
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "🌤️ Update weather and outfit recommendation - $(date +'%Y-%m-%d %H:%M:%S')" && git push)
